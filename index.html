<html lang="en">

    :root {

      --teal: #008a97;

      --aqua: #3ec6d3;
      --sky: #e8f8ff;
      --ice: #f5fcff;
      --line: #b9e4ec;
      --ink: #12313b;
      --muted: #5b7280;
      --white: #ffffff;
      --shadow: 0 18px 40px rgba(0, 92, 110, .16);
      --radius: 8px;

    * {
      box-sizing: border-box;
    }

    body {

      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;

      background:
        linear-gradient(135deg, rgba(62, 198, 211, .16), transparent 30%),
        linear-gradient(180deg, #f8fdff 0%, #eaf8fc 100%);
    }

    a {
      color: #00717d;
    }

    .top-ribbon {
      position: sticky;
      top: 0;
      z-index: 30;
      padding: 14px 18px;
      color: var(--white);
      background:

      border-bottom: 1px solid rgba(255, 255, 255, .25);
    }

    .top-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      max-width: 1440px;
      margin: 0 auto;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand-mark {
      display: grid;
      place-items: center;
      width: 46px;
      height: 46px;
      border-radius: var(--radius);

      color: #064454;
      background: linear-gradient(145deg, #ffffff, #bff5ff);

      flex: 0 0 auto;
    }

      font-size: clamp(1.25rem, 2vw, 2rem);
      line-height: 1.1;
      letter-spacing: 0;
    }

    .subtitle {
      margin-top: 4px;
      color: #dffaff;
      font-size: .9rem;
      line-height: 1.35;
    }
